<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>L'hora en català</title>
<meta name="description" content="Mostra l'hora dita en català correcte, com 'Dos quarts de cinc'. Funciona sense connexió i s'instal·la com una app." />
<meta name="theme-color" content="#e8e3c8" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#150829" media="(prefers-color-scheme: dark)" />

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hora CAT" />

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="topbar">
  <span class="brand">L'hora en català</span>
  <div class="toolbar">
    <button id="install-btn" class="icon-btn install-btn" type="button" title="Instal·la l'app" hidden>Descarrega l'App</button>
    <button id="theme-toggle" class="icon-btn theme-btn" type="button" title="Canvia el tema">NIT</button>
  </div>
</div>

<main>
  <button id="alarms-btn" class="chip-btn alarms-btn" type="button">Alarmes</button>

  <svg class="clock-face" viewBox="0 0 200 200" role="group" aria-label="Rellotge analògic, arrossega les agulles per canviar l'hora">
    <circle class="rim" cx="100" cy="100" r="96" />
    <g class="ticks"></g>
    <g class="numbers"></g>
    <line id="hand-hour" class="hand hour" x1="100" y1="100" x2="100" y2="58" />
    <line id="hand-minute" class="hand minute" x1="100" y1="100" x2="100" y2="32" />
    <line id="hand-second" class="hand second" x1="100" y1="100" x2="100" y2="10" />
    <circle class="pivot" cx="100" cy="100" r="5" />
    <circle class="hit-area" cx="100" cy="100" r="96" />
  </svg>

  <div class="hand-legend">
    <span class="legend-item"><span class="swatch hour"></span>Hora</span>
    <span class="legend-item"><span class="swatch minute"></span>Minut</span>
  </div>

  <div id="digital-time" class="digital-time">
    <span id="digi-h" class="digi-seg draggable" data-unit="hour" title="Arrossega amunt/avall per canviar l'hora">--</span><span class="digi-seg">:</span><span id="digi-m" class="digi-seg draggable" data-unit="minute" title="Arrossega amunt/avall per canviar els minuts">--</span><span class="digi-seg">:</span><span id="digi-s" class="digi-seg">--</span>
  </div>

  <div class="phrase-wrap">
    <p id="phrase" class="phrase" aria-live="polite">Un moment…</p>
  </div>

  <div id="date-line" class="date-line"></div>

  <div class="actions">
    <button id="reset-time-btn" class="chip-btn reset-time" type="button" hidden>Torna a l'hora actual</button>
    <button id="share-btn" class="chip-btn" type="button">Comparteix</button>
    <button id="copy-btn" class="chip-btn" type="button">Copia</button>
  </div>
</main>

<div id="alarms-modal" class="modal-overlay" hidden>
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="alarms-title">
    <div class="modal-header">
      <h2 id="alarms-title">Alarmes</h2>
      <button id="alarms-close" class="icon-btn" type="button" title="Tanca">X</button>
    </div>

    <ul id="alarms-list" class="alarms-list"></ul>
    <p id="alarms-empty" class="alarms-empty">Encara no tens cap alarma.</p>

    <div class="alarm-form">
      <span class="alarm-form-label">Nova alarma</span>
      <div class="alarm-form-time">
        <span id="alarm-spin-h" class="digi-seg draggable" title="Arrossega amunt/avall per canviar l'hora">07</span>
        <span class="digi-seg">:</span>
        <span id="alarm-spin-m" class="digi-seg draggable" title="Arrossega amunt/avall per canviar els minuts">00</span>
      </div>
      <button id="alarm-add-btn" class="chip-btn" type="button">Afegeix alarma</button>
    </div>
  </div>
</div>

<div class="status-row" style="justify-content:center; padding-bottom: 6px;">
  <span id="status-dot" class="status-dot"></span>
  <span id="status-text">En línia</span>
</div>

<footer>Instal·la-la a l'escriptori o al mòbil des del menú del navegador. Funciona sense connexió.</footer>

<div id="toast" class="toast" role="status">
  <span id="toast-msg"></span>
  <button id="toast-action" hidden type="button"></button>
</div>

<script src="js/catalanTime.js"></script>
<script src="js/app.js"></script>
</body>
</html>
